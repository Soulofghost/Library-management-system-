<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Books - LMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/dashboard.html">LMS</a>
    <div class="d-flex"><button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button></div>
  </div>
</nav>

<div class="container py-4">
  <div class="d-flex justify-content-between mb-3">
    <h2>Books</h2>
    <button id="addBtn" class="btn btn-success">Add Book</button>
  </div>
  <table id="booksTable" class="display table table-bordered" style="width:100%">
    <thead><tr><th>ID</th><th>Title</th><th>ISBN</th><th>Category</th><th>Publisher</th><th>Copies (total/avail)</th><th>Actions</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<div class="modal fade" id="bookModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <form id="bookForm" class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Book</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="bookId">
        <div class="row">
          <div class="col-md-6 mb-3"><label>ISBN</label><input id="isbn" class="form-control"></div>
          <div class="col-md-6 mb-3"><label>Title</label><input id="title" class="form-control" required></div>
        </div>
        <div class="mb-3"><label>Description</label><textarea id="description" class="form-control"></textarea></div>
        <div class="row">
          <div class="col-md-4 mb-3"><label>Category</label><select id="categorySelect" class="form-select"></select></div>
          <div class="col-md-4 mb-3"><label>Publisher</label><select id="publisherSelect" class="form-select"></select></div>
          <div class="col-md-4 mb-3"><label>Published Year</label><input id="publishedYear" type="number" class="form-control"></div>
        </div>
        <div class="mb-3"><label>Authors (hold ctrl/cmd to select multiple)</label><select id="authorsSelect" class="form-select" multiple></select></div>
        <div class="mb-3"><label>Total Copies</label><input id="totalCopies" type="number" class="form-control" value="1" min="1"></div>
        <div id="formError" class="text-danger" style="display:none;"></div>
      </div>
      <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" type="submit">Save</button></div>
    </form>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/books.js"></script>
</body>
</html>
