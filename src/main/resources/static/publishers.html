<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Publishers - LMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/dashboard.html">LMS</a>
    <div class="d-flex"><button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button></div>
  </div>
</nav>

<div class="container py-4">
  <div class="d-flex justify-content-between mb-3">
    <h2>Publishers</h2>
    <button id="addBtn" class="btn btn-success">Add Publisher</button>
  </div>
  <table id="publishersTable" class="display table table-bordered" style="width:100%">
    <thead><tr><th>ID</th><th>Name</th><th>Address</th><th>Phone</th><th>Email</th><th>Actions</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<div class="modal fade" id="publisherModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="publisherForm" class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Publisher</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="pubId">
        <div class="mb-3"><label class="form-label">Name</label><input id="pubName" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Address</label><textarea id="pubAddress" class="form-control"></textarea></div>
        <div class="mb-3"><label class="form-label">Phone</label><input id="pubPhone" class="form-control"></div>
        <div class="mb-3"><label class="form-label">Email</label><input id="pubEmail" class="form-control"></div>
        <div class="mb-3"><label class="form-label">Website</label><input id="pubWebsite" class="form-control"></div>
        <div id="formError" class="text-danger" style="display:none;"></div>
      </div>
      <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" type="submit">Save</button></div>
    </form>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/publishers.js"></script>
</body>
</html>
